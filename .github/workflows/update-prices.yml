name: Aggiorna prezzi Sorare

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Aggiorna prezzi
        run: node scripts/update-prices.mjs

      - name: Salva risultati
        run: |
          git config user.name "sorare-price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/history.json
          git diff --quiet --cached || git commit -m "Aggiornamento prezzi automatico"
          git push
